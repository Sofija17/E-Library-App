apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: e-library-ingress
  namespace: e-library
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 9091

          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80